services:
  server:
    build: .
    container_name: server
    ports:
      - "8080:8080"
    environment:
      POSTGRES_URL: postgres://${MAIN_POSTGRES_USER}:${MAIN_POSTGRES_PASSWORD}@postgres:5432/${MAIN_POSTGRES_DB}?sslmode=disable
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      garage-s3:
        condition: service_healthy

  postgres:
    image: postgres:18.4-alpine3.23
    container_name: main-postgres-db
    environment:
      POSTGRES_DB: ${MAIN_POSTGRES_DB}
      POSTGRES_USER: ${MAIN_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MAIN_POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U ${MAIN_POSTGRES_USER} -d ${MAIN_POSTGRES_DB}'" ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 5s

  migrate:
    build: migrations
    environment:
      POSTGRES_URL: postgres://${MAIN_POSTGRES_USER}:${MAIN_POSTGRES_PASSWORD}@postgres:5432/${MAIN_POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  garage-s3:
    image: dxflrs/garage:v2.3.0
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3903:3903"
    restart: unless-stopped
    volumes:
      - ./garage/garage.toml:/etc/garage.toml
    tmpfs:
      - /var/lib/garage/meta
      - /var/lib/garage/data
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET}
      - GARAGE_ADMIN_TOKEN=${GARAGE_ADMIN_TOKEN}
      - GARAGE_METRICS_TOKEN=${GARAGE_METRICS_TOKEN}
      - GARAGE_DEFAULT_BUCKET=${S3_BUCKET}
      - GARAGE_DEFAULT_ACCESS_KEY=${S3_ACCESS_KEY}
      - GARAGE_DEFAULT_SECRET_KEY=${S3_SECRET_KEY}
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"] # TODO: add health check, not status: https://git.deuxfleurs.fr/Deuxfleurs/garage/issues/1354
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    command: /garage server --single-node --default-bucket

